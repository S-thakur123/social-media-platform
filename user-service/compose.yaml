services:
  user-service:
    build: 
      context: .  # This stays relative to this file
    env_file: 
      - ../.env   # Point it to the root .env file
    depends_on:
      - postgres
      - rabbitmq
  postgres:
    image: 'postgres:latest'
    environment:
      # These variables will be injected from your .env file
      POSTGRES_DB: ${DB_NAME:-mydatabase}
      POSTGRES_PASSWORD: ${DB_PASS:-secret}
      POSTGRES_USER: ${DB_USER:-myuser}
    ports:
      - '5432:5432'

  rabbitmq:
    image: 'rabbitmq:3-management'
    environment:
      # Management console and connection credentials
      RABBITMQ_DEFAULT_PASS: ${RABBIT_PASS:-secret}
      RABBITMQ_DEFAULT_USER: ${RABBIT_USER:-myuser}
    ports:
      - '5672:5672'         # App connection
      - '15672:15672'       # Management UI

  grafana-lgtm:
    image: 'grafana/otel-lgtm:latest'
    ports:
      - '3000:3000'         # Grafana Dashboard
      - '4317:4317'         # OTLP gRPC
      - '4318:4318'         # OTLP HTTP (What your Gateway uses)