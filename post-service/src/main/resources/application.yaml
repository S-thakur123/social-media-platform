server:
  port: ${POST_SERVICE_PORT:8082}

spring:
  application:
    name: post-service

  # RabbitMQ Messaging (Used for Chat events, Notifications, etc.)
  rabbitmq:
    host: ${RABBIT_HOST:localhost}
    port: ${RABBIT_PORT:5672}
    username: ${RABBIT_USER:guest}
    password: ${RABBIT_PASS:guest}

# Service Discovery (Connects to the Eureka Server)
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true